<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STEALIEN Marketing Archive</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Pretendard,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#f6f7fb;
    color:#222;
}

header{
    background:linear-gradient(135deg,#341064,#501A9B);
    color:white;
    padding:80px 0;
    text-align:center;
}

header h1{
    font-size:42px;
    margin-bottom:12px;
}

header p{
    opacity:.9;
    font-size:18px;
}

.container{
    width:1100px;
    max-width:92%;
    margin:auto;
    margin-top:-40px;
}

.year{
    font-size:30px;
    margin:50px 0 25px;
    color:#501A9B;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:18px;
    padding:28px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    transition:.25s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h2{
    font-size:28px;
    margin-bottom:18px;
    color:#501A9B;
}

.card ul{
    margin-left:18px;
    line-height:1.8;
    margin-bottom:15px;
}

.card li{
    margin-bottom:6px;
}

.button{
    display:inline-block;
    margin-top:15px;
    background:#501A9B;
    color:white;
    padding:12px 22px;
    border-radius:10px;
    text-decoration:none;
    font-weight:600;
}

.button:hover{
    background:#341064;
}

.coming{
    color:#999;
    font-style:italic;
}

footer{
    text-align:center;
    padding:60px;
    color:#888;
}

</style>

</head>
